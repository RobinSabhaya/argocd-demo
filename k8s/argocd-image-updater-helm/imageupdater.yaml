apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: argocd-image-updater-helm
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "argocd-image-updater-helm"
      images:
        - alias: "argocd-image-updater-helm"
          imageName: "robinsabhaya/app"
          manifestTargets:
            helm:
              name: "image.repository"
              tag: "image.tag"
      writeBackConfig:
        method: "git:secret:argocd/git-creds"
      commonUpdateSettings:
        updateStrategy: "semver"
