kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: argocd-image-updater-helm
  namespace: argocd
  labels:
    name: argocd-image-updater-helm
spec:
  project: default
  source:
    repoURL: https://github.com/RobinSabhaya/argocd-demo.git
    targetRevision: master
    path: k8s/argocd-image-updater-helm/argocd-image-updater-helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
