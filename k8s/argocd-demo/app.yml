kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: demo-app
  namespace: argocd
  labels:
    name: demo-app
spec:
  project: default
  source:
    repoURL: https://github.com/RobinSabhaya/argocd-demo.git
    targetRevision: master
    path: k8s/argocd-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
