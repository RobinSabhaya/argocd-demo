kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: chai-app
  namespace: argocd
  labels:
    name: chai-app
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=robinsabhaya/app
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/argocd-image-updater-git-creds
    argocd-image-updater.argoproj.io/chai-app.update-strategy: semver

spec:
  project: default              # Associates this Application with the 'default' ArgoCD project
  source:
    repoURL: https://github.com/RobinSabhaya/argocd-demo.git # Git repository containing the app manifests
    targetRevision: master        # Branch or tag to track in the repository
    path: k8s/argocd-demo # Path within the repo where the manifests(kustomization) are located
  destination:
    server: https://kubernetes.default.svc # Kubernetes API server address (in-cluster)
    namespace: default           # Namespace in the cluster where app resources will be deployed
  syncPolicy:
    automated:                  # Enables automated sync for the application
      prune: true               # Automatically deletes resources that are no longer defined in Git
      selfHeal: true            # Automatically corrects drift between live and desired state